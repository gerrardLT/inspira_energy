version: "3.9"

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inspira_energy
      POSTGRES_USER: inspira
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inspira_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspira -d inspira_energy"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Next.js Application ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://inspira:${POSTGRES_PASSWORD:-inspira_dev_password}@postgres:5432/inspira_energy
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-test}
      SMTP_PASS: ${SMTP_PASS:-test}
      SMTP_FROM: ${SMTP_FROM:-noreply@inspiraenergy.com}
      EMAIL_IR_TEAM: ${EMAIL_IR_TEAM:-ir@inspiraenergy.com}
      EMAIL_DEV_TEAM: ${EMAIL_DEV_TEAM:-dev@inspiraenergy.com}
      EMAIL_SUPPORT_TEAM: ${EMAIL_SUPPORT_TEAM:-support@inspiraenergy.com}
      UPLOAD_DIR: /app/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_PLATFORM: ${WEBHOOK_PLATFORM:-wechat}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── MailHog (开发环境邮件捕获) ──────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    profiles:
      - dev

volumes:
  postgres_data:
  upload_data:
