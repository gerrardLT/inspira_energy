name: Deploy to Production

on:
  push:
    branches: [main]

env:
  DEPLOY_HOST: 5.104.84.96
  DEPLOY_USER: root
  DEPLOY_PATH: /www/wwwroot/inspira_energy
  DOCKER_COMPOSE_FILE: docker-compose.prod.yml

jobs:
  # ─── Job 1: 代码质量检查 ─────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript 类型检查
        run: npx tsc --noEmit --skipLibCheck

      - name: ESLint 代码规范
        run: npm run lint
        continue-on-error: true

  # ─── Job 2: 部署到生产服务器 ─────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            
            echo "=== [1/6] 进入项目目录 ==="
            mkdir -p ${{ env.DEPLOY_PATH }}
            cd ${{ env.DEPLOY_PATH }}
            
            echo "=== [2/6] 拉取最新代码 ==="
            if [ -d ".git" ]; then
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/gerrardLT/inspira_energy.git .
            fi
            
            echo "=== [3/6] 检查 Docker 环境 ==="
            docker --version || { echo "Docker 未安装"; exit 1; }
            docker compose version || { echo "Docker Compose 未安装"; exit 1; }
            
            echo "=== [4/6] 加载环境变量 ==="
            if [ ! -f ".env" ]; then
              echo "⚠️ .env 文件不存在，请先配置环境变量"
              exit 1
            fi
            
            echo "=== [5/6] 构建并启动服务 ==="
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml build --no-cache app
            docker compose -f docker-compose.prod.yml up -d
            
            echo "=== [6/6] 执行数据库迁移 ==="
            docker compose -f docker-compose.prod.yml exec -T app node -e "
              const { Pool } = require('pg');
              const { drizzle } = require('drizzle-orm/node-postgres');
              const { migrate } = require('drizzle-orm/node-postgres/migrator');
              const pool = new Pool({ connectionString: process.env.DATABASE_URL, max: 1 });
              const db = drizzle(pool);
              migrate(db, { migrationsFolder: './src/lib/db/migrations' })
                .then(() => { console.log('✅ 迁移完成'); pool.end(); })
                .catch(e => { console.error('❌ 迁移失败:', e); pool.end(); process.exit(1); });
            "
            
            echo "=== ✅ 部署完成 ==="
            docker compose -f docker-compose.prod.yml ps
