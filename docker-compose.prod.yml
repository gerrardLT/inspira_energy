# ─── 生产环境 Docker Compose 配置 ──────────────────────────────────────────────
# 使用方式：docker compose -f docker-compose.prod.yml up -d
# 注意：需要同目录下有 .env 文件配置数据库密码等敏感信息

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: inspira_energy
      POSTGRES_USER: inspira
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspira -d inspira_energy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Next.js Application ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:${APP_PORT:-3100}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://inspira:${POSTGRES_PASSWORD}@postgres:5432/inspira_energy
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      EMAIL_IR_TEAM: ${EMAIL_IR_TEAM}
      EMAIL_DEV_TEAM: ${EMAIL_DEV_TEAM}
      EMAIL_SUPPORT_TEAM: ${EMAIL_SUPPORT_TEAM}
      UPLOAD_DIR: /app/uploads
      CORS_ORIGIN: https://inspira.energy
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_PLATFORM: ${WEBHOOK_PLATFORM:-wechat}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

volumes:
  postgres_data:
  upload_data:

networks:
  internal:
    driver: bridge
